<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IAPR File Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:900px;
    margin:auto;
    padding:20px;
}

.box{
    border:1px solid #ccc;
    border-radius:8px;
    padding:15px;
    margin-bottom:15px;
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}

h2{
    text-align:center;
}

.subtitle{
    text-align:center;
    font-size:12px;
    font-style:italic;
    color:#666;
    margin-top:-10px;
    margin-bottom:25px;
}
</style>
</head>

<body>

<h2>IAPR File Generator</h2>

<p class="subtitle">
Generate experiment-wise IAPR upload files automatically
</p>

<div class="box">
    <b>INPUT.xlsx</b><br><br>
    <input type="file" id="inputFile" accept=".xlsx,.xls">
</div>

<div class="box">
    <b>OUTPUT Template.xlsx</b><br><br>
    <input type="file" id="templateFile" accept=".xlsx,.xls">
</div>

<button onclick="generateFiles()">
Generate ZIP
</button>

<script>

function readFile(file){

    return new Promise((resolve,reject)=>{

        const reader=new FileReader();

        reader.onload=e=>resolve(e.target.result);

        reader.onerror=reject;

        reader.readAsArrayBuffer(file);
    });
}

function cleanId(value){

    if(value===undefined || value===null)
        return "";

    return String(value)
        .replace(".0","")
        .trim();
}

async function generateFiles(){

    const inputFile =
        document.getElementById("inputFile").files[0];

    const templateFile =
        document.getElementById("templateFile").files[0];

    if(!inputFile || !templateFile){

        alert("Please upload both files.");
        return;
    }

    const inputBuffer =
        await readFile(inputFile);

    const templateBuffer =
        await readFile(templateFile);

    const inputWB =
        XLSX.read(inputBuffer);

    const templateWB =
        XLSX.read(templateBuffer);

    const inputSheet =
        XLSX.utils.sheet_to_json(
            inputWB.Sheets[
                inputWB.SheetNames[0]
            ],
            {header:1}
        );

    const zip = new JSZip();

    const headerRow = inputSheet[0];

    const experimentColumns = [];

    // G onwards = index 6 onwards
    for(let c=6;c<headerRow.length;c++){

        const header = headerRow[c];

        if(header===undefined ||
           header===null ||
           String(header).trim()==="")
            break;

        experimentColumns.push(c);
    }

    if(experimentColumns.length===0){

        alert("No experiment columns found.");
        return;
    }

    for(let expIndex=0;
        expIndex<experimentColumns.length;
        expIndex++){

        const expCol =
            experimentColumns[expIndex];

        const workbook =
            XLSX.read(templateBuffer);

        const sheet =
            workbook.Sheets[
                workbook.SheetNames[0]
            ];

        const rows =
            XLSX.utils.sheet_to_json(
                sheet,
                {header:1}
            );

        const stuRollCol =
            rows[0].findIndex(
                x=>String(x).trim()
                ==="StuRollNo"
            );

        const markCol =
            rows[0].findIndex(
                x=>String(x).trim()
                ==="Mark"
            );

        if(stuRollCol===-1 ||
           markCol===-1){

            alert(
              "StuRollNo or Mark column not found."
            );
            return;
        }

        const inputMap = {};

        for(let r=1;
            r<inputSheet.length;
            r++){

            const row =
                inputSheet[r];

            const id =
                cleanId(row[2]); // Column C

            if(!id) continue;

            inputMap[id] =
                row[expCol];
        }

        for(let r=1;
            r<rows.length;
            r++){

            const row =
                rows[r];

            const roll =
                cleanId(
                    row[stuRollCol]
                );

            if(!roll)
                continue;

            row[markCol] =
                inputMap[roll] ?? 0;
        }

        const outputSheet =
            XLSX.utils.aoa_to_sheet(
                rows
            );

        workbook.Sheets[
            workbook.SheetNames[0]
        ] = outputSheet;

        const wbout =
            XLSX.write(
                workbook,
                {
                    type:"array",
                    bookType:"xlsx"
                }
            );

        const fileName =
            "IAPR_Exp" +
            String(expIndex+1)
            .padStart(2,"0")
            + ".xlsx";

        zip.file(
            fileName,
            wbout
        );
    }

    const zipBlob =
        await zip.generateAsync({
            type:"blob"
        });

    const a =
        document.createElement("a");

    a.href =
        URL.createObjectURL(
            zipBlob
        );

    a.download =
        "IAPR_Files.zip";

    a.click();

    URL.revokeObjectURL(
        a.href
    );

    alert(
        experimentColumns.length +
        " files generated successfully."
    );
}

</script>

</body>
</html>
